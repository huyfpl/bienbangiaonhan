<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Biên bản bàn giao có chữ ký</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/signature-algorithm.js"></script>
  <style>
    @font-face {
      font-family: "SignatureNiceMemory";
      src:
        url("fonts/14TH Nice Memory.otf") format("opentype"),
        url("fonts/14TH Nice Memory.ttf") format("truetype"),
        url("font/14TH Nice Memory.otf") format("opentype"),
        url("font/14TH Nice Memory.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "SignatureHarbour";
      src:
        url("fonts/Fz-Harbour-Light.ttf") format("truetype"),
        url("font/Fz-Harbour-Light.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "SignatureMotherland";
      src:
        url("fonts/NVN-Motherland-Signature.ttf") format("truetype"),
        url("font/NVN-Motherland-Signature.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --paper: #fffdf8;
      --ink: #111;
      --muted: #64717d;
      --line: #d7e0e7;
      --panel: #ffffff;
      --bg: #f4f7f8;
      --brand: #ff0037;
      --brand-dark: #9f1116;
      --teal: #0f5967;
      --soft: #eef4f6;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 12px;
      color: var(--ink);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .controls {
      background: var(--panel);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(18, 35, 48, 0.08);
    }

    .controls-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 10px;
      text-align: center;
      flex-wrap: wrap;
    }

    .controls-head > div:first-child {
      display: contents;
    }

    .control-title {
      font-weight: 800;
      color: var(--brand);
      font-size: 18px;
      line-height: 1.25;
      width: 100%;
      text-align: center;
    }

    .control-note,
    .field-note,
    .receiver-status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .control-note {
      text-align: center;
    }

    .control-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) repeat(3, minmax(145px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .checkbox-field {
      align-self: end;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #cdd9e2;
      border-radius: 6px;
      background: #fff;
      color: #26333d;
      font-size: 13px;
      font-weight: 700;
    }

    .checkbox-field input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--brand);
    }

    .field span {
      color: #26333d;
      font-size: 13px;
      font-weight: 700;
    }

    input[type=file],
    input[type=number],
    select,
    textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid #cdd9e2;
      border-radius: 6px;
      background: #fff;
      color: #101820;
      font: 15px/1.35 Arial, Helvetica, sans-serif;
      padding: 8px 10px;
      outline: none;
    }

    textarea {
      min-height: 74px;
      resize: vertical;
    }

    input[type=file]:focus,
    input[type=number]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 89, 103, 0.14);
    }

    .primary-action,
    .actions,
    .receiver-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .primary-action {
      justify-content: center;
      padding-top: 2px;
    }

    .primary-action button {
      width: min(100%, 360px);
      min-height: 48px;
      font-size: 16px;
    }

    .actions {
      justify-content: center;
    }

    button {
      min-height: 40px;
      padding: 8px 13px;
      border-radius: 6px;
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font: 700 14px/1.2 Arial, Helvetica, sans-serif;
    }

    button:hover { background: var(--brand-dark); }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    button.ghost {
      background: #fff;
      color: var(--brand);
    }

    button.ghost:hover {
      background: #fff4f4;
    }

    button.secondary {
      border-color: var(--teal);
      background: var(--teal);
    }

    button.secondary:hover {
      background: #0b4752;
    }

    .receiver-panel {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .receiver-panel.is-open { display: grid; gap: 8px; }

    .receiver-status {
      min-height: 19px;
    }

    .preview-shell {
      overflow-x: auto;
      overflow-y: hidden;
      display: block;
      padding-bottom: 18px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      scroll-snap-type: x proximity;
    }

    .pages-wrapper {
      display: flex;
      flex-direction: row;
      gap: 18px;
      align-items: flex-start;
      min-width: 210mm;
      width: max-content;
      transform-origin: top left;
      padding: 0 2px 10px;
    }

    .page-frame {
      flex: 0 0 auto;
      display: grid;
      gap: 8px;
      justify-items: center;
      scroll-snap-align: center;
      contain: layout paint style;
      content-visibility: auto;
      contain-intrinsic-size: 812px 1148px;
    }

    .page-label {
      color: #3c4953;
      font: 700 13px/1.2 Arial, Helvetica, sans-serif;
      user-select: none;
    }

    .page-nav {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0 0 10px;
      flex-wrap: wrap;
    }

    .page-nav.is-visible {
      display: flex;
    }

    .page-nav button {
      min-height: 34px;
      padding: 6px 12px;
    }

    .page-nav-status {
      min-width: 112px;
      text-align: center;
      color: #26333d;
      font: 700 13px/1.2 Arial, Helvetica, sans-serif;
    }

    .page,
    .page-continuation {
      width: 210mm;
      min-height: 297mm;
      height: 297mm;
      margin: 0 auto;
      background-color: var(--paper);
      background-image:
        linear-gradient(104deg, transparent 0 18%, rgba(118, 99, 67, 0.032) 18.35%, rgba(255, 255, 255, 0.16) 19.05%, transparent 20.2%),
        linear-gradient(78deg, transparent 0 48%, rgba(78, 64, 43, 0.036) 48.25%, rgba(255, 255, 255, 0.2) 49.1%, transparent 50.2%),
        linear-gradient(164deg, transparent 0 70%, rgba(95, 78, 54, 0.026) 70.2%, rgba(255, 255, 255, 0.18) 71.05%, transparent 72%),
        repeating-linear-gradient(92deg, rgba(92, 76, 52, 0.012) 0 1px, transparent 1px 11px),
        repeating-linear-gradient(2deg, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px 15px),
        radial-gradient(ellipse at 18% 12%, rgba(116, 96, 58, 0.035) 0, transparent 32%),
        radial-gradient(ellipse at 78% 66%, rgba(88, 74, 48, 0.026) 0, transparent 34%),
        radial-gradient(ellipse at 48% 42%, rgba(255, 255, 255, 0.45) 0, transparent 54%),
        linear-gradient(93deg, rgba(110, 96, 72, 0.018), transparent 24%, rgba(255, 255, 255, 0.22) 48%, transparent 76%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(253, 249, 238, 0.34));
      background-size: 100% 100%;
      padding: 12mm;
      box-shadow:
        inset 0 0 0 1px rgba(150, 135, 100, 0.16),
        inset 0 0 24mm rgba(90, 76, 45, 0.035),
        0 0 6px rgba(0,0,0,0.08);
      page-break-after: always;
      font-family: "Times New Roman", Times, serif;
      overflow: hidden;
      contain: layout paint;
    }

    .pages-wrapper.is-paginating .page-frame,
    .pages-wrapper.is-exporting-png .page-frame {
      content-visibility: visible;
    }

    @page { size: A4 portrait; margin: 0; }

    @media print {
      body { margin: 0; padding: 0; background: #fff; zoom: 90%; }
      .container { margin: 0; padding: 0; max-width: none; }
      .controls { display: none !important; }
      .png-preview-modal { display: none !important; }
      .preview-shell { overflow: visible; padding: 0; }
      .pages-wrapper { min-width: 0; width: auto; display: block; transform: none !important; padding: 0; }
      .page-frame { display: block; }
      .page-frame { content-visibility: visible; contain: none; }
      .page-label,
      .page-nav { display: none !important; }
      .preview-shell { height: auto !important; }
      .page,
      .page-continuation {
        background: #fff !important;
        box-shadow: none;
        margin: 0;
        padding: 10mm;
        height: 297mm;
        min-height: 297mm;
        overflow: hidden;
        contain: none;
      }
      .codes { page-break-inside: auto; }
      .page:empty,
      .page-continuation:empty { display: none; }
    }

    .header-table { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
    .header-table td { vertical-align: top; padding: 0; }
    .logo-cell { width: 160px; padding-left: 6px; }
    .logo-cell img { max-width: 150px; display: block; margin: auto; }
    .company-block {
      text-align: center;
      font-weight: 700;
      font-size: 9px;
      line-height: 1.05;
      margin-top: 6px;
      white-space: nowrap;
    }
    .company-block .line2 { display: block; margin-top: 4px; }
    .center-cell { text-align: center; }
    .center-cell .gov { font-size: 13px; font-weight: 700; }
    .center-cell .motto { font-size: 14px; margin-top: 6px; font-weight: 600; }
    .date-cell {
      width: 160px;
      text-align: right;
      font-style: italic;
      font-size: 12px;
      padding-right: 6px;
      white-space: nowrap;
    }

    h1.title {
      display: block;
      width: 100%;
      text-align: center;
      margin: 8px 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 6px; }
    .info-table td { padding: 4px 6px; vertical-align: top; }
    .info-left { width: 60%; }
    .info-right { width: 40%; }
    .receiver-names {
      display: inline-block;
      max-width: calc(100% - 52px);
      vertical-align: baseline;
      font-weight: 700;
      word-break: break-word;
    }

    .note { font-style: italic; margin: 6px 0; font-size: 13px; }

    .codes {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      page-break-inside: auto;
    }
    .codes th,
    .codes td {
      border: 0.55px solid rgba(20, 20, 20, 0.44);
      padding: 2px 4px;
      text-align: center;
      vertical-align: middle;
      word-break: break-all;
    }
    .codes th { font-weight: 700; background: rgba(255, 255, 255, 0.2); }
    .codes td.stt { font-weight: 600; }
    .codes tr { page-break-inside: avoid; }

    .confirm {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.3;
    }

    .sign-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      font-size: 13px;
      table-layout: fixed;
    }

    .sign-table td {
      vertical-align: bottom;
      text-align: center;
      padding: 5px 6px;
    }

    .sign-title {
      font-weight: 700;
      height: 24px;
    }

    .sign-gap { width: 4%; }

    .sign-space {
      height: 84px;
      vertical-align: top !important;
      padding-top: 0 !important;
    }

    .handover-signature {
      min-height: 78px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .handover-signature .signature-list {
      min-height: 76px;
      grid-template-columns: minmax(150px, 1fr);
    }

    .handover-full-name {
      margin-top: -5px;
      font-size: 13px;
      line-height: 1.12;
      font-weight: 400;
    }

    .receiver-confirmation {
      margin-top: -2px;
      font-size: 13px;
      line-height: 1.15;
      font-weight: 700;
    }

    .signature-list {
      min-height: 68px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      align-items: start;
      justify-items: center;
      gap: 0 4px;
    }

    .signature-list.compact {
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
    }

    .signature-list.receiver-cloud {
      display: flex;
      width: 100%;
      max-width: 330px;
      min-height: 0;
      margin: 0 auto;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-start;
      align-content: flex-start;
      justify-content: center;
      gap: 0;
      padding: 0;
    }

    .signature-item {
      width: 100%;
      min-height: 62px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    .receiver-cloud .signature-item {
      width: auto;
      min-height: 46px;
      align-items: center;
      flex: 0 0 auto;
      margin: -3px -4px;
    }

    .receiver-cloud .signature-item + .signature-item {
      margin-left: 0;
    }

    .signature-row-break {
      flex-basis: 100%;
      width: 0;
      height: 0;
      margin-top: -12px;
    }

    .signature-canvas {
      display: block;
      max-width: 100%;
      image-rendering: auto;
    }

    .signature-empty {
      min-height: 70px;
    }

    .tbl-wrap { overflow: hidden; }

    .is-exporting-png .logo-cell img {
      filter: grayscale(1) brightness(0);
    }

    .is-exporting-png .codes th,
    .is-exporting-png .codes td {
      border-color: rgba(20, 20, 20, 0.34);
      border-width: 0.45px;
    }

    .is-exporting-png .codes td.stt {
      font-weight: 500;
    }

    .png-preview-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: rgba(10, 18, 26, 0.58);
    }

    .png-preview-modal.is-open {
      display: flex;
    }

    .png-preview-dialog {
      width: min(980px, 100%);
      max-height: calc(100dvh - 24px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
      border: 1px solid rgba(215, 224, 231, 0.9);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
    }

    .png-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .png-preview-title {
      font-weight: 800;
      color: #1d2a34;
      font-size: 16px;
      line-height: 1.25;
    }

    .png-preview-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .png-preview-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .png-preview-body {
      flex: 1 1 auto;
      overflow: auto;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px;
      background: #e9eef2;
      -webkit-overflow-scrolling: touch;
    }

    .png-preview-page {
      width: min(82vw, 794px);
      min-width: min(82vw, 794px);
      margin: 0 auto;
      content-visibility: auto;
      contain-intrinsic-size: 794px 1123px;
    }

    .png-preview-page img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      box-shadow: 0 6px 22px rgba(20, 28, 36, 0.18);
    }

    .png-preview-empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px 12px;
    }

    @media (max-width: 760px) {
      body { padding: 8px; }
      .container { max-width: none; }
      .controls { padding: 10px; }
      .controls-head {
        display: flex;
        gap: 6px 10px;
      }
      .control-title { text-align: center; }
      .control-note {
        position: static;
        max-width: none;
        text-align: center;
      }
      .control-grid { grid-template-columns: 1fr; }
      .primary-action {
        justify-content: stretch;
      }
      .primary-action button {
        width: 100%;
      }
      .actions,
      .receiver-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .actions button,
      .receiver-actions button {
        width: 100%;
      }
      .preview-shell {
        margin: 0 -8px;
        overflow-x: auto;
        padding: 0 8px 16px;
      }
      .png-preview-modal {
        padding: 8px;
        align-items: stretch;
      }
      .png-preview-dialog {
        max-height: calc(100dvh - 16px);
      }
      .png-preview-head {
        align-items: stretch;
        flex-direction: column;
        gap: 9px;
      }
      .png-preview-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .png-preview-actions button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .actions,
      .receiver-actions,
      .png-preview-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls" role="region" aria-label="Điều khiển tạo biên bản">
      <div class="controls-head">
        <div>
          <div class="control-title">Biên bản bàn giao</div>
  
        </div>
        <div class="control-note">Mã vận đơn = cột A · Nhân viên = cột M</div>
      </div>

      <div class="control-grid">
        <label class="field">
          <span>File kiểm kho</span>
          <input type="file" id="inventoryFile" accept=".xlsx,.xls" title="Upload file kiểm kho (.xlsx)"/>
        </label>

        <label class="field">
          <span>Người bàn giao</span>
          <select id="employeeSelect" title="Chọn nhân viên">
            <option value="">-- Chọn nhân viên --</option>
          </select>
        </label>

        <label class="field">
          <span>Mã bưu cục</span>
          <select id="bcSelect" title="Chọn mã bưu cục">
            <option value="">-- Chọn Mã BC --</option>
          </select>
        </label>

        <label class="field">
          <span>Cỡ chữ ký</span>
          <input type="number" id="signatureSizeInput" min="1" max="50" step="1" value="26" title="Nhập cỡ chữ ký từ 1 đến 50"/>
        </label>

        <label class="field">
          <span>Nền PNG tải lên</span>
          <input type="file" id="pngBackgroundFile" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" title="Tải ảnh nền khi xuất PNG"/>
        </label>

        <label class="checkbox-field" title="Dùng ảnh nền đã tải khi xuất PNG">
          <input type="checkbox" id="pngUseUploadedBackgroundToggle" checked>
          <span>Bật nền tải lên</span>
        </label>

      </div>

      <div class="primary-action">
        <button type="button" id="btnGenerate">Tạo biên bản</button>
      </div>

      <div class="actions">
        <button type="button" id="btnToggleReceiver" class="secondary">Nhập người nhận</button>
        <button type="button" id="btnExportPng" class="ghost">Xuất PNG</button>
        <button type="button" id="btnPrint">In A4</button>
      </div>

      <div class="receiver-panel" id="receiverPanel">
        <label class="field" for="receiverNamesInput">
          <span>Tên người nhận bàn giao</span>
          <textarea id="receiverNamesInput" placeholder="Ví dụ: Nguyễn Văn A, Trần Thị B"></textarea>
        </label>
        <div class="field-note">Có thể nhập một hoặc nhiều tên, mỗi tên cách nhau bằng dấu phẩy (,).</div>
        <div class="receiver-actions">
          <button type="button" id="btnSaveReceiver" class="ghost">Lưu tên người nhận</button>
        </div>
        <div class="receiver-status" id="receiverStatus">Chưa nhập người nhận.</div>
      </div>
    </div>

    <div class="page-nav" id="pageNav">
      <button type="button" id="btnPrevPage" class="ghost">Previous</button>
      <span class="page-nav-status" id="pageNavStatus">Trang 1 / 1</span>
      <button type="button" id="btnNextPage" class="ghost">Next</button>
    </div>

    <div class="preview-shell" id="previewShell">
      <div id="pages" class="pages-wrapper"></div>
    </div>
  </div>

  <div class="png-preview-modal" id="pngPreviewModal" aria-hidden="true">
    <div class="png-preview-dialog" role="dialog" aria-modal="true" aria-labelledby="pngPreviewTitle">
      <div class="png-preview-head">
        <div>
          <div class="png-preview-title" id="pngPreviewTitle">Xem trước PNG</div>
          <div class="png-preview-note" id="pngPreviewNote">Kiểm tra ảnh trước khi tải xuống.</div>
        </div>
        <div class="png-preview-actions">

  </div>

<script>

  function todayDateString() {

  }

  const CURRENT_DATE_STR = todayDateString();
  const inventoryFile = document.getElementById("inventoryFile");
  const employeeSelect = document.getElementById("employeeSelect");
  const signatureSizeInput = document.getElementById("signatureSizeInput");
  const pngBackgroundFile = document.getElementById("pngBackgroundFile");
  const pngUseUploadedBackgroundToggle = document.getElementById("pngUseUploadedBackgroundToggle");
  const btnGenerate = document.getElementById("btnGenerate");
  const btnToggleReceiver = document.getElementById("btnToggleReceiver");
  const btnExportPng = document.getElementById("btnExportPng");
  const btnPrint = document.getElementById("btnPrint");
  const receiverPanel = document.getElementById("receiverPanel");
  const receiverNamesInput = document.getElementById("receiverNamesInput");
  const btnSaveReceiver = document.getElementById("btnSaveReceiver");
  const receiverStatus = document.getElementById("receiverStatus");
  const previewShell = document.getElementById("previewShell");
  const pagesWrapper = document.getElementById("pages");
  const pageNav = document.getElementById("pageNav");
  const btnPrevPage = document.getElementById("btnPrevPage");
  const btnNextPage = document.getElementById("btnNextPage");
  const pageNavStatus = document.getElementById("pageNavStatus");
  const pngPreviewModal = document.getElementById("pngPreviewModal");
  const pngPreviewBody = document.getElementById("pngPreviewBody");
  const pngPreviewNote = document.getElementById("pngPreviewNote");
  const btnCopyPreviewPng = document.getElementById("btnCopyPreviewPng");
  const btnDownloadPreviewPng = document.getElementById("btnDownloadPreviewPng");
  const btnClosePngPreview = document.getElementById("btnClosePngPreview");

  let empMap = {};
  let receiverNames = [];
  let receiverSignatureStates = [];
  let receiverSignaturesReady = false;
  let handoverSignatureState = null;
  let handoverSignatureName = "";
  let activeEmpName = "";
  let activeCodes = [];
  let hasGeneratedDocument = false;
  let pngPreviewFiles = [];
  let blackLogoDataUrl = "";
  let currentPageIndex = 0;
  let uploadedBackgroundDataUrl = "";
  let pageMetrics = [];
  let previewScrollRaf = 0;
  const signatureFontsReady = SignatureAlgorithm.loadFontsFromFolder("fonts", "font");

  function escapeHtml(s) {
    return String(s || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function parseReceiverNames(value) {
    return String(value || "")
      .split(",")
      .map((name) => name.trim())
      .filter(Boolean);
  }

  function updateReceiverStatus() {
    if (!receiverNames.length) {
      receiverStatus.textContent = "Chưa nhập người nhận.";
      return;
    }
    const names = receiverNames.join(", ");
    receiverStatus.textContent = receiverSignaturesReady
      ? `Đã tạo chữ ký cho: ${names}`
      : `Đã lưu: ${names}`;
  }

  function getBcInfo() {
    const maBC = bcSelect.value || Object.keys(bcMap)[0];
    return { maBC, tenBC: bcMap[maBC] || "" };
  }

  function getHandoverSignName(fullName) {
    const words = String(fullName || "").trim().split(/\s+/).filter(Boolean);
    return (words[words.length - 1] || fullName || "").toLocaleLowerCase("vi");
  }

  function getReceiverSignName(fullName) {
    return String(fullName || "").trim().replace(/\s+/g, " ").toLocaleLowerCase("vi");
  }

  function makeSigner(fullName) {
    return {
      signatureText: getHandoverSignName(fullName),
      fullName
    };
  }

  function makeReceiverSigner(fullName) {
    return {
      signatureText: getReceiverSignName(fullName),
      fullName,
      showFullName: false
    };
  }

  function selectedSignatureFontSize() {
    if (signatureSizeInput.value === "") return 26;
    const value = Math.max(1, Math.min(50, Number(signatureSizeInput.value) || 26));
    if (String(value) !== signatureSizeInput.value) signatureSizeInput.value = value;
    return value;
  }

  function syncSignatureFontSize() {
    SignatureAlgorithm.setBaseFontSize(selectedSignatureFontSize());
  }

  function fileDateString(date = new Date()) {
    return `${String(date.getDate()).padStart(2, "0")}-${String(date.getMonth() + 1).padStart(2, "0")}-${date.getFullYear()}`;
  }

  function sanitizeFileNamePart(value) {
    return String(value || "bien_ban_ban_giao")
      .trim()
      .replace(/[<>:"/\\|?*\u0000-\u001F]/g, "")
      .replace(/\s+/g, "_")
      .replace(/_+/g, "_") || "bien_ban_ban_giao";
  }

  function pngFileName(index, total) {
    const pageSuffix = total > 1 ? `_trang_${String(index + 1).padStart(2, "0")}` : "";
    return `${sanitizeFileNamePart(activeEmpName)}${fileDateString()}${pageSuffix}.png`;
  }

  function ensureHandoverSignature(empName, force = false) {
    if (!empName) return null;
    syncSignatureFontSize();
    if (force || !handoverSignatureState || handoverSignatureName !== empName) {
      handoverSignatureState = SignatureAlgorithm.makeSignatureState("normal", "handover");
      handoverSignatureName = empName;
    }
    return handoverSignatureState;
  }

  function randomizeReceiverSignatures() {
    syncSignatureFontSize();
    const compact = receiverNames.length > 2;
    const avoidFonts = handoverSignatureState && handoverSignatureState.fontFamily ? [handoverSignatureState.fontFamily] : [];
    receiverSignatureStates = receiverNames.map(() => SignatureAlgorithm.makeSignatureState(compact ? "compact" : "normal", "receiver", avoidFonts));
    receiverSignaturesReady = receiverNames.length > 0;
  }

  function refreshSignatureSizing() {
    syncSignatureFontSize();
    if (handoverSignatureName) {
      handoverSignatureState = SignatureAlgorithm.makeSignatureState("normal", "handover");
    }
    if (receiverSignaturesReady && receiverNames.length) {
      randomizeReceiverSignatures();
    }
    rerenderCurrentDocument();
  }

  function saveReceiverNames(makeSignatures = false) {
    const nextNames = parseReceiverNames(receiverNamesInput.value);
    receiverNames = nextNames;

    if (makeSignatures) {
      if (!receiverNames.length) {
        alert("Hãy nhập ít nhất một tên người nhận bàn giao.");
        receiverSignaturesReady = false;
      } else {
        randomizeReceiverSignatures();
      }
    } else {
      receiverSignaturesReady = false;
      receiverSignatureStates = [];
    }

    updateReceiverStatus();
    rerenderCurrentDocument();
  }

  function readReceiverNamesForGenerate() {
    receiverNames = parseReceiverNames(receiverNamesInput.value);
    if (receiverNames.length) {
      randomizeReceiverSignatures();
    } else {
      receiverSignatureStates = [];
      receiverSignaturesReady = false;
    }
    updateReceiverStatus();
  }

  function fitPreviewToScreen() {
    pagesWrapper.style.transform = "";
    previewShell.style.height = "";
    updatePageLabels();
  }

  function schedulePreviewFit() {
    requestAnimationFrame(async () => {
      if (pagesWrapper.classList.contains("is-exporting-png")) return;
      try {
        await SignatureAlgorithm.paintSignatures(pagesWrapper);
      } catch (err) {
        console.warn("Không vẽ được chữ ký ở lần này:", err);
      }
      fitPreviewToScreen();
    });
  }

  function confirmSignHtml(empName) {
    const handoverSignature = empName
      ? `
        <div class="handover-signature">
          ${SignatureAlgorithm.renderSignatureGroup([makeSigner(empName)], [ensureHandoverSignature(empName)], true)}
        </div>
      `
      : '<div class="signature-empty"></div>';
    const receiverSignature = SignatureAlgorithm.renderSignatureGroup(
      receiverNames.map(makeReceiverSigner),
      receiverSignatureStates,
      receiverSignaturesReady
    );

    return `
      <div class="confirm">
        <div>Bên B xác nhận đã nhận đúng số lượng và mã vận đơn chi tiết như trên.</div>
        <div>Biên bản được lập thành 02 bản, mỗi bên giữ 01 bản.</div>
      </div>
      <table class="sign-table">
        <tr>
          <td class="sign-title" style="width:48%;">NGƯỜI BÀN GIAO</td>
          <td class="sign-gap"></td>
          <td class="sign-title" style="width:48%;">NGƯỜI NHẬN BÀN GIAO</td>
        </tr>
        <tr>
          <td class="sign-space">${handoverSignature}</td>
          <td></td>
          <td class="sign-space">${receiverSignature}</td>
        </tr>
        <tr>
          <td>(Ký, ghi rõ họ tên)</td>
          <td></td>
          <td>(Ký, ghi rõ họ tên)</td>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td class="receiver-confirmation">Tôi xác nhận đã nhận đủ hàng</td>
        </tr>
      </table>
    `;
  }

  function receiverNamesHtml() {
    if (!receiverNames.length) return "................................................";
    return escapeHtml(receiverNames.join(", "));
  }

  function createFirstPageSkeleton(empName, dateStr, maBC, tenBC) {
    const receiverDisplay = receiverNamesHtml();

    return `
      <div class="page">
        <table class="header-table"><tr>
          <td class="logo-cell">
            <img src="${LOGO_URL}" crossorigin="anonymous" alt="logo"/>
            <div class="company-block">
              <span class="line1">CÔNG TY TNHH MTV CPN THUẬN PHONG</span>
              <span class="line2">CHI NHÁNH HÀ NỘI</span>
            </div>
          </td>
          <td class="center-cell">
            <div class="gov">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div>
            <div class="motto">Độc Lập - Tự Do - Hạnh Phúc</div>
          </td>
          <td class="date-cell">${escapeHtml(dateStr || CURRENT_DATE_STR)}</td>
        </tr></table>

        <h1 class="title">BIÊN BẢN BÀN GIAO</h1>

        <table class="info-table">
          <tr>
            <td class="info-left"><b>Bên Bàn Giao (A):</b> Mã BC:
              <span id="maBC" style="font-weight: bolder;">${escapeHtml(maBC || "")}</span>
            </td>
            <td class="info-right">Tên BC:
              <b id="tenBC">${escapeHtml(tenBC || "")}</b>
            </td>
          </tr>
          <tr>
            <td class="info-left">Ông/Bà: <span id="nguoiGiao" style="font-weight: bolder;">${escapeHtml(empName || "...........................")}</span></td>
            <td class="info-right">Chức vụ: <span id="cv" style="font-weight: bolder;">Bưu tá</span></td>
          </tr>
          <tr><td class="info-left"><b>Bên Nhận Bàn Giao (B):</b></td><td></td></tr>
          <tr>
            <td class="info-left">Ông/Bà: <span class="receiver-names">${receiverDisplay}</span></td>
            <td class="info-right">Chức vụ: <b>Shop</b></td>
          </tr>
        </table>

        <div class="note">Hai bên cùng xác nhận việc bàn giao chi tiết như sau:</div>

        <div class="tbl-wrap">
          <table class="codes">
            <thead>
              <tr>
                <th>Stt</th><th>Mã vận đơn</th>
                <th>Stt</th><th>Mã vận đơn</th>
                <th>Stt</th><th>Mã vận đơn</th>
                <th>Stt</th><th>Mã vận đơn</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    `;
  }

  const TABLE_COLS = 4;
  const EMPTY_TABLE_ROW_HTML = '<tr><td class="stt">&nbsp;</td><td class="code">&nbsp;</td><td class="stt">&nbsp;</td><td class="code">&nbsp;</td><td class="stt">&nbsp;</td><td class="code">&nbsp;</td><td class="stt">&nbsp;</td><td class="code">&nbsp;</td></tr>';

  function htmlToElement(html) {
    const template = document.createElement("template");
    template.innerHTML = String(html || "").trim();
    return template.content.firstElementChild;
  }

  function getPageEls() {
    return Array.from(pagesWrapper.querySelectorAll(".page, .page-continuation"));
  }

  function appendPage(pageEl, shouldUpdateLabels = true) {
    const frame = document.createElement("div");
    frame.className = "page-frame";
    const label = document.createElement("div");
    label.className = "page-label";
    frame.appendChild(label);
    frame.appendChild(pageEl);
    pagesWrapper.appendChild(frame);
    if (shouldUpdateLabels) updatePageLabels();
    return pageEl;
  }

  function removePage(pageEl, shouldUpdateLabels = true) {
    const frame = pageEl.closest(".page-frame");
    if (frame) frame.remove();
    else pageEl.remove();
    if (shouldUpdateLabels) updatePageLabels();
  }

  function refreshPageMetrics(pages = getPageEls()) {
    pageMetrics = pages.map((pageEl, index) => {
      const frame = pageEl.closest(".page-frame") || pageEl;
      return {
        index,
        center: frame.offsetLeft + frame.offsetWidth / 2
      };
    });
  }

  function updatePageLabels() {
    const pages = getPageEls();
    const total = Math.max(1, pages.length);
    pages.forEach((pageEl, index) => {
      pageEl.dataset.pageIndex = String(index);
      const label = pageEl.closest(".page-frame")?.querySelector(".page-label");
      if (label) label.textContent = `Trang ${index + 1} / ${total}`;
    });
    currentPageIndex = Math.max(0, Math.min(currentPageIndex, total - 1));
    pageNav.classList.toggle("is-visible", total > 1);
    pageNavStatus.textContent = `Trang ${currentPageIndex + 1} / ${total}`;
    btnPrevPage.disabled = currentPageIndex <= 0;
    btnNextPage.disabled = currentPageIndex >= total - 1;
    refreshPageMetrics(pages);
  }

  function scrollToPage(index) {
    const pages = getPageEls();
    if (!pages.length) return;
    currentPageIndex = Math.max(0, Math.min(index, pages.length - 1));
    updatePageLabels();
    const frame = pages[currentPageIndex].closest(".page-frame") || pages[currentPageIndex];
    frame.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
  }

  function updateCurrentPageFromScroll() {
    const pages = getPageEls();
    if (!pages.length) return;
    if (pageMetrics.length !== pages.length) refreshPageMetrics(pages);
    const shellCenter = previewShell.scrollLeft + previewShell.clientWidth / 2;
    let bestIndex = 0;
    let bestDistance = Infinity;
    pageMetrics.forEach((metric) => {
      const distance = Math.abs(metric.center - shellCenter);
      if (distance < bestDistance) {
        bestDistance = distance;
        bestIndex = metric.index;
      }
    });
    currentPageIndex = bestIndex;
    updatePageLabels();
  }

  function buildTableRows(codes, startIndex, maxRows) {
    const rows = [];
    const totalRows = Math.min(maxRows, Math.ceil((codes.length - startIndex) / TABLE_COLS));
    for (let r = 0; r < totalRows; r++) {
      let rowHtml = "<tr>";
      for (let c = 0; c < TABLE_COLS; c++) {
        const idx = r * TABLE_COLS + c + startIndex;
        if (idx < codes.length) {
          rowHtml += `<td class="stt">${idx + 1}</td><td class="code">${escapeHtml(codes[idx])}</td>`;
        } else {
          rowHtml += '<td class="stt">&nbsp;</td><td class="code">&nbsp;</td>';
        }
      }
      rowHtml += "</tr>";
      rows.push(rowHtml);
    }
    return rows;
  }

  function appendEmptyRows(tbody, count) {
    if (count > 0) tbody.insertAdjacentHTML("beforeend", EMPTY_TABLE_ROW_HTML.repeat(count));
  }

  function createContinuationPage() {
    const contPage = document.createElement("div");
    contPage.className = "page-continuation";

    const tblWrap = document.createElement("div");
    tblWrap.className = "tbl-wrap";

    const table = document.createElement("table");
    table.className = "codes";

    const tbody = document.createElement("tbody");
    table.appendChild(tbody);
    tblWrap.appendChild(table);
    contPage.appendChild(tblWrap);

    return { page: contPage, tblWrap, tbody };
  }

  function isPageOverflowing(pageEl) {
    return pageEl.scrollHeight > pageEl.clientHeight + 2;
  }

  function appendMeasuredCodeRows(pageEl, tbody, codes, startIndex) {
    let currentIndex = startIndex;

    while (currentIndex < codes.length) {
      const rowHtml = buildTableRows(codes, currentIndex, 1)[0];
      if (!rowHtml) break;

      tbody.insertAdjacentHTML("beforeend", rowHtml);
      const insertedRow = tbody.lastElementChild;

      if (isPageOverflowing(pageEl)) {
        insertedRow.remove();
        if (currentIndex === startIndex) {
          tbody.insertAdjacentHTML("beforeend", rowHtml);
          currentIndex += TABLE_COLS;
        }
        break;
      }

      currentIndex += TABLE_COLS;
    }

    return currentIndex;
  }

  function removeSignatureFromPage(pageEl) {
    Array.from(pageEl.children).forEach((child) => {
      if (child.classList.contains("confirm") || child.classList.contains("sign-table")) {
        child.remove();
      }
    });
  }

  function appendSignatureToPage(pageEl, empName) {
    removeSignatureFromPage(pageEl);
    const tblWrap = pageEl.querySelector(".tbl-wrap");
    if (tblWrap) tblWrap.insertAdjacentHTML("afterend", confirmSignHtml(empName));
  }

  function removeEmptyContinuationPages(shouldUpdateLabels = true) {
    Array.from(pagesWrapper.querySelectorAll(".page-continuation")).forEach((pageEl) => {
      const hasRows = !!pageEl.querySelector(".codes tbody tr");
      const hasSignature = !!pageEl.querySelector(".confirm, .sign-table");
      if (!hasRows && !hasSignature) removePage(pageEl, shouldUpdateLabels);
    });
  }

  function appendSignatureWithPagination(empName, shouldUpdateLabels = true) {
    const pages = getPageEls();
    const lastPage = pages[pages.length - 1];
    if (!lastPage) return;

    appendSignatureToPage(lastPage, empName);
    if (!isPageOverflowing(lastPage)) return;

    removeSignatureFromPage(lastPage);

    const finalPage = createContinuationPage();
    appendPage(finalPage.page, shouldUpdateLabels);
    appendSignatureToPage(finalPage.page, empName);
    removeEmptyContinuationPages(shouldUpdateLabels);
  }

  function paginateRows(empName, codes) {
    pagesWrapper.classList.add("is-paginating");
    pagesWrapper.innerHTML = "";
    pagesWrapper.style.transform = "";
    previewShell.style.height = "";
    currentPageIndex = 0;

    const { maBC, tenBC } = getBcInfo();
    const firstPage = htmlToElement(createFirstPageSkeleton(empName, CURRENT_DATE_STR, maBC, tenBC));
    const firstTbody = firstPage.querySelector(".codes tbody");
    appendPage(firstPage, false);

    if (!codes || !codes.length) {
      appendEmptyRows(firstTbody, 8);
      appendSignatureWithPagination(empName, false);
      pagesWrapper.classList.remove("is-paginating");
      updatePageLabels();
      schedulePreviewFit();
      return;
    }

    let currentIndex = appendMeasuredCodeRows(firstPage, firstTbody, codes, 0);

    while (currentIndex < codes.length) {
      const contPage = createContinuationPage();
      appendPage(contPage.page, false);

      const nextIndex = appendMeasuredCodeRows(contPage.page, contPage.tbody, codes, currentIndex);
      currentIndex = nextIndex > currentIndex ? nextIndex : currentIndex + TABLE_COLS;
    }

    appendSignatureWithPagination(empName, false);
    pagesWrapper.classList.remove("is-paginating");
    updatePageLabels();
    schedulePreviewFit();
  }

  function showInitialTemplate() {
    pagesWrapper.classList.add("is-paginating");
    pagesWrapper.innerHTML = "";
    pagesWrapper.style.transform = "";
    previewShell.style.height = "";
    currentPageIndex = 0;

    const { maBC, tenBC } = getBcInfo();
    const firstPage = htmlToElement(createFirstPageSkeleton("", CURRENT_DATE_STR, maBC, tenBC));
    const tbody = firstPage.querySelector(".codes tbody");
    appendEmptyRows(tbody, 8);
    appendPage(firstPage, false);
    appendSignatureWithPagination("", false);
    pagesWrapper.classList.remove("is-paginating");
    updatePageLabels();
    schedulePreviewFit();
  }

  function rerenderCurrentDocument() {
    clearPngPreview();
    if (hasGeneratedDocument) {
      paginateRows(activeEmpName, activeCodes);
    } else {
      showInitialTemplate();
    }
  }

  function canvasToPngBlob(canvas) {
    return new Promise((resolve, reject) => {
      canvas.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error("Không tạo được PNG blob."));
      }, "image/png");
    });
  }

  function blobToObjectUrl(blob) {
    return URL.createObjectURL(blob);
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function drawPaperTexture(ctx, x, y, width, height) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, width, height);
    ctx.clip();

    const grainScale = 0.55;
    const grainWidth = Math.max(1, Math.round(width * grainScale));
    const grainHeight = Math.max(1, Math.round(height * grainScale));
    const grain = ctx.createImageData(grainWidth, grainHeight);
    for (let i = 0; i < grain.data.length; i += 4) {
      const warm = 236 + Math.floor(Math.random() * 20);
      const speck = Math.random() > 0.985 ? -18 : 0;
      grain.data[i] = Math.max(0, warm + speck);
      grain.data[i + 1] = Math.max(0, warm - 2 + speck);
      grain.data[i + 2] = Math.max(0, warm - 8 + speck);
      grain.data[i + 3] = 10 + Math.floor(Math.random() * 16);
    }
    const texture = document.createElement("canvas");
    texture.width = grainWidth;
    texture.height = grainHeight;
    texture.getContext("2d").putImageData(grain, 0, 0);
    ctx.globalAlpha = 0.55;
    ctx.drawImage(texture, x, y, width, height);

    ctx.globalAlpha = 0.075;
    ctx.lineCap = "round";
    for (let i = 0; i < 180; i++) {
      const sx = x + Math.random() * width;
      const sy = y + Math.random() * height;
      const len = width * (0.015 + Math.random() * 0.055);
      ctx.strokeStyle = i % 3 === 0 ? "rgba(84, 72, 52, 0.34)" : "rgba(255, 255, 255, 0.55)";
      ctx.lineWidth = 0.35 + Math.random() * 0.75;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(
        sx + len * 0.45,
        sy + (Math.random() - 0.5) * height * 0.008,
        sx + len,
        sy + (Math.random() - 0.5) * height * 0.012
      );
      ctx.stroke();
    }

    ctx.globalAlpha = 0.05;
    for (let i = 0; i < 8; i++) {
      const sx = x + width * (0.08 + Math.random() * 0.84);
      const sy = y + height * (0.06 + Math.random() * 0.88);
      const len = width * (0.28 + Math.random() * 0.55);
      ctx.strokeStyle = i % 2 ? "rgba(54, 48, 38, 0.32)" : "rgba(255, 255, 255, 0.55)";
      ctx.lineWidth = 1.2 + Math.random() * 3.2;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.bezierCurveTo(
        sx + len * 0.24,
        sy - height * (0.018 + Math.random() * 0.022),
        sx + len * 0.64,
        sy + height * (0.012 + Math.random() * 0.028),
        sx + len,
        sy + (Math.random() - 0.5) * height * 0.035
      );
      ctx.stroke();
    }

    const wrinkleLines = [
      [0.06, 0.19, 0.92, 0.12, -0.018, 1.9, 0.055],
      [0.13, 0.38, 0.88, 0.45, 0.016, 1.35, 0.045],
      [0.08, 0.73, 0.86, 0.68, -0.014, 1.5, 0.05],
      [0.33, 0.05, 0.26, 0.94, 0.012, 1.15, 0.036],
      [0.69, 0.08, 0.78, 0.9, -0.01, 1.05, 0.032]
    ];

    wrinkleLines.forEach(([sx, sy, ex, ey, bend, lineWidth, alpha], index) => {
      const x1 = x + width * sx;
      const y1 = y + height * sy;
      const x2 = x + width * ex;
      const y2 = y + height * ey;
      const dx = x2 - x1;
      const dy = y2 - y1;
      const length = Math.max(1, Math.hypot(dx, dy));
      const nx = -dy / length;
      const ny = dx / length;
      const cx = (x1 + x2) / 2 + nx * width * bend;
      const cy = (y1 + y2) / 2 + ny * height * bend;
      const jitter = index % 2 ? -1 : 1;

      ctx.globalCompositeOperation = "multiply";
      ctx.globalAlpha = 1;
      ctx.strokeStyle = `rgba(62, 50, 32, ${alpha})`;
      ctx.lineWidth = lineWidth + Math.random() * 0.65;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1 + nx * 1.2 * jitter, y1 + ny * 1.2 * jitter);
      ctx.quadraticCurveTo(cx + nx * 1.8 * jitter, cy + ny * 1.8 * jitter, x2 + nx * 1.2 * jitter, y2 + ny * 1.2 * jitter);
      ctx.stroke();

      ctx.globalCompositeOperation = "screen";
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 1.9})`;
      ctx.lineWidth = Math.max(0.7, lineWidth * 0.6);
      ctx.beginPath();
      ctx.moveTo(x1 - nx * 1.6 * jitter, y1 - ny * 1.6 * jitter);
      ctx.quadraticCurveTo(cx - nx * 2.4 * jitter, cy - ny * 2.4 * jitter, x2 - nx * 1.6 * jitter, y2 - ny * 1.6 * jitter);
      ctx.stroke();
    });

    ctx.globalCompositeOperation = "source-over";

    const edge = ctx.createRadialGradient(
      x + width * 0.5,
      y + height * 0.45,
      width * 0.12,
      x + width * 0.5,
      y + height * 0.5,
      width * 0.7
    );
    edge.addColorStop(0, "rgba(255, 255, 255, 0.16)");
    edge.addColorStop(0.72, "rgba(255, 255, 255, 0)");
    edge.addColorStop(1, "rgba(68, 54, 35, 0.12)");
    ctx.globalAlpha = 1;
    ctx.fillStyle = edge;
    ctx.fillRect(x, y, width, height);

    ctx.restore();
  }

  async function drawUploadedBackground(ctx, width, height) {
    if (!uploadedBackgroundDataUrl) return false;
    try {
      const img = await loadImage(uploadedBackgroundDataUrl);
      const scale = Math.max(width / img.naturalWidth, height / img.naturalHeight);
      const drawWidth = img.naturalWidth * scale;
      const drawHeight = img.naturalHeight * scale;
      ctx.drawImage(img, (width - drawWidth) / 2, (height - drawHeight) / 2, drawWidth, drawHeight);
      return true;
    } catch (err) {
      console.warn("Không dùng được ảnh nền tải lên:", err);
      return false;
    }
  }

  async function composePageOnBackground(pageCanvas, pageIndex) {
    const shouldUseUploadedBackground = pngUseUploadedBackgroundToggle.checked && !!uploadedBackgroundDataUrl;
    const marginX = shouldUseUploadedBackground ? Math.round(pageCanvas.width * 0.16) : 0;
    const marginY = shouldUseUploadedBackground ? Math.round(pageCanvas.height * 0.08) : 0;
    const canvas = document.createElement("canvas");
    canvas.width = pageCanvas.width + marginX * 2;
    canvas.height = pageCanvas.height + marginY * 2;
    const ctx = canvas.getContext("2d");

    const usedUpload = shouldUseUploadedBackground && await drawUploadedBackground(ctx, canvas.width, canvas.height);
    if (!usedUpload) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(pageCanvas, 0, 0);
      drawPaperTexture(ctx, 0, 0, pageCanvas.width, pageCanvas.height);
      return canvas;
    }

    const angleDirection = pageIndex % 2 ? 1 : -1;
    const angle = angleDirection * (0.7 + Math.random() * 1.1) * Math.PI / 180;
    const offsetX = Math.round((Math.random() - 0.5) * marginX * 0.16);
    const offsetY = Math.round((Math.random() - 0.5) * marginY * 0.16);
    const centerX = canvas.width / 2 + offsetX;
    const centerY = canvas.height / 2 + offsetY;

    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(angle);
    ctx.shadowColor = "rgba(20, 24, 28, 0.28)";
    ctx.shadowBlur = Math.round(pageCanvas.width * 0.028);
    ctx.shadowOffsetX = Math.round(pageCanvas.width * 0.012);
    ctx.shadowOffsetY = Math.round(pageCanvas.width * 0.02);
    ctx.fillStyle = "#f7f4ea";
    ctx.fillRect(-pageCanvas.width / 2, -pageCanvas.height / 2, pageCanvas.width, pageCanvas.height);
    ctx.shadowColor = "transparent";
    ctx.drawImage(pageCanvas, -pageCanvas.width / 2, -pageCanvas.height / 2);
    drawPaperTexture(ctx, Math.round(-pageCanvas.width / 2), Math.round(-pageCanvas.height / 2), pageCanvas.width, pageCanvas.height);
    ctx.restore();

    return canvas;
  }

  async function makeBlackLogoDataUrl() {
    if (blackLogoDataUrl) return blackLogoDataUrl;

    blackLogoDataUrl = await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        try {
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth || img.width;
          canvas.height = img.naturalHeight || img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < imageData.data.length; i += 4) {
            if (imageData.data[i + 3] > 0) {
              imageData.data[i] = 0;
              imageData.data[i + 1] = 0;
              imageData.data[i + 2] = 0;
            }
          }
          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL("image/png"));
        } catch (err) {
          reject(err);
        }
      };
      img.onerror = () => reject(new Error("Không tải được logo để đổi màu đen."));
      img.src = LOGO_URL;
    });

    return blackLogoDataUrl;
  }

  async function waitForImages(root) {
    const images = Array.from(root.querySelectorAll("img"));
    await Promise.allSettled(images.map((img) => {
      if (img.complete && img.naturalWidth) return Promise.resolve();
      if (img.decode) return img.decode();
      return new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }));
  }

  function setExportBusy(isBusy) {
    btnExportPng.disabled = isBusy;
    btnExportPng.textContent = isBusy ? "Đang tạo PNG..." : "Xuất PNG";
  }

  function setCopyBusy(isBusy) {
    btnCopyPreviewPng.disabled = isBusy;
    btnCopyPreviewPng.textContent = isBusy ? "Đang copy..." : "Copy PNG";
  }

  function clearPngPreview() {
    pngPreviewFiles.forEach((file) => {
      if (file.url && file.url.startsWith("blob:")) URL.revokeObjectURL(file.url);
    });
    pngPreviewFiles = [];
    pngPreviewBody.innerHTML = '<div class="png-preview-empty">Chưa có ảnh xem trước.</div>';
    pngPreviewNote.textContent = "Kiểm tra ảnh trước khi tải xuống.";
  }

  function showPngPreview(files) {
    pngPreviewFiles.forEach((file) => {
      if (file.url && file.url.startsWith("blob:")) URL.revokeObjectURL(file.url);
    });
    pngPreviewFiles = files;
    pngPreviewBody.innerHTML = files.map((file, index) => `
      <div class="png-preview-page">
        <img src="${file.url}" alt="Trang PNG ${index + 1}" loading="lazy" decoding="async">
      </div>
    `).join("");
    pngPreviewNote.textContent = `Đã tạo ${files.length} trang PNG. Có thể Copy PNG hoặc Tải PNG.`;
    pngPreviewModal.classList.add("is-open");
    pngPreviewModal.setAttribute("aria-hidden", "false");
  }

  function closePngPreview() {
    pngPreviewModal.classList.remove("is-open");
    pngPreviewModal.setAttribute("aria-hidden", "true");
  }

  function downloadPreviewPngFiles() {
    if (!pngPreviewFiles.length) {
      alert("Chưa có PNG để tải.");
      return;
    }

    pngPreviewFiles.forEach((file, index) => {
      window.setTimeout(() => {
        const link = document.createElement("a");
        link.download = file.name;
        link.href = file.url;
        link.click();
      }, index * 120);
    });
  }

  async function copyPreviewPngFiles() {
    if (!pngPreviewFiles.length) {
      alert("Chưa có PNG để copy.");
      return;
    }
    if (!navigator.clipboard || !window.ClipboardItem) {
      alert("Trình duyệt hiện tại chưa hỗ trợ copy ảnh PNG. Hãy dùng nút Tải PNG.");
      return;
    }

    try {
      setCopyBusy(true);
      const file = pngPreviewFiles[0];
      await navigator.clipboard.write([
        new ClipboardItem({ "image/png": file.blob })
      ]);
      pngPreviewNote.textContent = pngPreviewFiles.length > 1
        ? `Đã copy trang 1/${pngPreviewFiles.length} vào clipboard.`
        : "Đã copy PNG vào clipboard.";
    } catch (err) {
      console.error(err);
      alert("Không copy được PNG. Hãy thử tải PNG hoặc mở bằng Chrome/Edge.");
    } finally {
      setCopyBusy(false);
    }
  }

  async function exportPagesAsPng() {
    if (!hasGeneratedDocument) {
      alert("Hãy tạo biên bản trước khi xuất PNG.");
      return;
    }

    const pageEls = getPageEls();
    if (!pageEls.length) return alert("Chưa có trang biên bản để xuất.");
    if (!window.html2canvas) return alert("Chưa tải được thư viện xuất PNG. Hãy kiểm tra kết nối mạng.");

    const oldTransform = pagesWrapper.style.transform;
    const oldHeight = previewShell.style.height;
    const logoImgs = Array.from(pagesWrapper.querySelectorAll(".logo-cell img"));
    const originalLogoSrcs = logoImgs.map((img) => img.getAttribute("src"));
    pagesWrapper.style.transform = "";
    previewShell.style.height = "";

    try {
      setExportBusy(true);
      clearPngPreview();
      pagesWrapper.classList.add("is-exporting-png");

      try {
        const blackLogo = await makeBlackLogoDataUrl();
        logoImgs.forEach((img) => {
          img.src = blackLogo;
        });
      } catch (logoErr) {
        console.warn("Không đổi được logo sang ảnh đen, dùng CSS filter khi xuất PNG:", logoErr);
      }

      await waitForImages(pagesWrapper);
      if (document.fonts && document.fonts.ready) await document.fonts.ready.catch(() => {});
      await SignatureAlgorithm.paintSignatures(pagesWrapper);
      await new Promise((resolve) => setTimeout(resolve, 80));
      pagesWrapper.style.transform = "";
      previewShell.style.height = "";

      const files = [];
      for (let i = 0; i < pageEls.length; i++) {
        pagesWrapper.style.transform = "";
        previewShell.style.height = "";
        const canvas = await html2canvas(pageEls[i], {
          backgroundColor: null,
          scale: 4,
          useCORS: true,
          logging: false
        });
        const composedCanvas = await composePageOnBackground(canvas, i);
        const blob = await canvasToPngBlob(composedCanvas);
        files.push({
          name: pngFileName(i, pageEls.length),
          url: blobToObjectUrl(blob),
          blob
        });
      }
      showPngPreview(files);
    } catch (err) {
      console.error(err);
      alert("Không xuất được PNG. Nếu lỗi do logo online, hãy thử lại khi có mạng ổn định.");
    } finally {
      logoImgs.forEach((img, index) => {
        img.src = originalLogoSrcs[index] || LOGO_URL;
      });
      pagesWrapper.classList.remove("is-exporting-png");
      setExportBusy(false);
      pagesWrapper.style.transform = oldTransform;
      previewShell.style.height = oldHeight;
      schedulePreviewFit();
    }
  }

  async function printCurrentDocument() {
    if (hasGeneratedDocument) {
      paginateRows(activeEmpName, activeCodes);
    }

    pagesWrapper.style.transform = "";
    previewShell.style.height = "";

    try {
      if (document.fonts && document.fonts.ready) await document.fonts.ready.catch(() => {});
      await SignatureAlgorithm.paintSignatures(pagesWrapper);
    } catch (err) {
      console.warn("Không vẽ được chữ ký trước khi in:", err);
    }

    pagesWrapper.style.transform = "";
    previewShell.style.height = "";
    window.print();
    schedulePreviewFit();
  }

  syncSignatureFontSize();
  showInitialTemplate();
  updateReceiverStatus();

  inventoryFile.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return alert("Chọn file kiểm kho (.xlsx)");

    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const sh = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(sh, { header: 1, defval: "" });
        empMap = {};

        for (let i = 0; i < aoa.length; i++) {
          const row = aoa[i];
          const emp = String(row[12] || "").trim();
          const code = String(row[0] || "").trim();
          if (emp && code) {
            if (!empMap[emp]) empMap[emp] = [];
            empMap[emp].push(code);
          }
        }

        employeeSelect.innerHTML = '<option value="">-- Chọn nhân viên --</option>';
        Object.keys(empMap).sort((a, b) => a.localeCompare(b, "vi")).forEach((k) => {
          const o = document.createElement("option");
          o.value = k;
          o.textContent = k;
          employeeSelect.appendChild(o);
        });

        alert("Đã nạp dữ liệu nhân viên từ Excel.");
      } catch (err) {
        console.error(err);
        alert("Lỗi đọc file Excel.");
      }
    };
    reader.readAsArrayBuffer(file);
  });

  btnGenerate.addEventListener("click", async () => {
    const empName = employeeSelect.value;
    if (!empName) return alert("Hãy chọn nhân viên bàn giao.");

    await signatureFontsReady;
    activeEmpName = empName;
    activeCodes = empMap[empName] || [];
    hasGeneratedDocument = true;
    ensureHandoverSignature(empName, true);
    readReceiverNamesForGenerate();
    paginateRows(activeEmpName, activeCodes);
  });

  btnToggleReceiver.addEventListener("click", () => {
    receiverPanel.classList.toggle("is-open");
    if (receiverPanel.classList.contains("is-open")) {
      receiverNamesInput.focus();
    }
  });

  btnSaveReceiver.addEventListener("click", () => {
    saveReceiverNames(false);
  });

  btnExportPng.addEventListener("click", exportPagesAsPng);
  btnCopyPreviewPng.addEventListener("click", copyPreviewPngFiles);
  btnDownloadPreviewPng.addEventListener("click", downloadPreviewPngFiles);
  btnClosePngPreview.addEventListener("click", closePngPreview);
  btnPrevPage.addEventListener("click", () => scrollToPage(currentPageIndex - 1));
  btnNextPage.addEventListener("click", () => scrollToPage(currentPageIndex + 1));
  previewShell.addEventListener("scroll", () => {
    if (previewScrollRaf) return;
    previewScrollRaf = requestAnimationFrame(() => {
      previewScrollRaf = 0;
      updateCurrentPageFromScroll();
    });
  }, { passive: true });
  pngUseUploadedBackgroundToggle.addEventListener("change", clearPngPreview);
  pngBackgroundFile.addEventListener("change", () => {
    const file = pngBackgroundFile.files && pngBackgroundFile.files[0];
    if (!file) {
      uploadedBackgroundDataUrl = "";
      return;
    }
    if (!["image/jpeg", "image/png", "image/webp"].includes(file.type)) {
      pngBackgroundFile.value = "";
      uploadedBackgroundDataUrl = "";
      alert("Chỉ hỗ trợ ảnh nền JPG, PNG hoặc WEBP.");
      return;
    }
    const reader = new FileReader();
    reader.onload = (event) => {
      uploadedBackgroundDataUrl = String(event.target.result || "");
      clearPngPreview();
    };
    reader.readAsDataURL(file);
  });
  pngPreviewModal.addEventListener("click", (event) => {
    if (event.target === pngPreviewModal) closePngPreview();
  });
  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && pngPreviewModal.classList.contains("is-open")) {
      closePngPreview();
    }
  });
  bcSelect.addEventListener("change", rerenderCurrentDocument);
  signatureSizeInput.addEventListener("change", refreshSignatureSizing);
  signatureSizeInput.addEventListener("input", refreshSignatureSizing);
  window.addEventListener("resize", fitPreviewToScreen);
  btnPrint.addEventListener("click", printCurrentDocument);
</script>
