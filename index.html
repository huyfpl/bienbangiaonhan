<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <title>Biên bản bàn giao có chữ ký</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/signature-algorithm.js"></script>
  <style>
    @font-face {
      font-family: "SignatureNiceMemory";
      src:
        url("font/14TH Nice Memory.otf") format("opentype"),
        url("font/14TH Nice Memory.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "SignatureHarbour";
      src: url("font/Fz-Harbour-Light.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "SignatureMotherland";
      src: url("font/NVN-Motherland-Signature.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --paper: #fffdf8;
      --ink: #111;
      --muted: #64717d;
      --line: #d7e0e7;
      --panel: #ffffff;
      --bg: #f4f7f8;
      --brand: #ff0037;
      --brand-dark: #9f1116;
      --teal: #0f5967;
      --soft: #eef4f6;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 12px;
      color: var(--ink);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .controls {
      background: var(--panel);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(18, 35, 48, 0.08);
    }

    .controls-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 10px;
      text-align: center;
      flex-wrap: wrap;
    }

    .controls-head > div:first-child {
      display: contents;
    }

    .control-title {
      font-weight: 800;
      color: var(--brand);
      font-size: 18px;
      line-height: 1.25;
      width: 100%;
      text-align: center;
    }

    .control-note,
    .field-note,
    .receiver-status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .control-note {
      text-align: center;
    }

    .control-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) repeat(3, minmax(145px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field span {
      color: #26333d;
      font-size: 13px;
      font-weight: 700;
    }

    input[type=file],
    select,
    textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid #cdd9e2;
      border-radius: 6px;
      background: #fff;
      color: #101820;
      font: 15px/1.35 Arial, Helvetica, sans-serif;
      padding: 8px 10px;
      outline: none;
    }

    textarea {
      min-height: 74px;
      resize: vertical;
    }

    input[type=file]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 89, 103, 0.14);
    }

    .primary-action,
    .actions,
    .receiver-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .primary-action {
      justify-content: center;
      padding-top: 2px;
    }

    .primary-action button {
      width: min(100%, 360px);
      min-height: 48px;
      font-size: 16px;
    }

    .actions {
      justify-content: center;
    }

    button {
      min-height: 40px;
      padding: 8px 13px;
      border-radius: 6px;
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font: 700 14px/1.2 Arial, Helvetica, sans-serif;
    }

    button:hover { background: var(--brand-dark); }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    button.ghost {
      background: #fff;
      color: var(--brand);
    }

    button.ghost:hover {
      background: #fff4f4;
    }

    button.secondary {
      border-color: var(--teal);
      background: var(--teal);
    }

    button.secondary:hover {
      background: #0b4752;
    }

    .receiver-panel {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .receiver-panel.is-open { display: grid; gap: 8px; }

    .receiver-status {
      min-height: 19px;
    }

    .preview-shell {
      overflow-x: auto;
      display: flex;
      justify-content: center;
      padding-bottom: 18px;
      -webkit-overflow-scrolling: touch;
    }

    .pages-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
      min-width: 210mm;
      transform-origin: top center;
    }

    .page,
    .page-continuation {
      width: 210mm;
      min-height: 297mm;
      height: 297mm;
      margin: 0 auto;
      background-color: var(--paper);
      background-image:
        repeating-linear-gradient(84deg, transparent 0 22px, rgba(105, 93, 67, 0.024) 22px 23px, transparent 24px 58px),
        repeating-linear-gradient(174deg, transparent 0 34px, rgba(255, 255, 255, 0.36) 34px 35px, transparent 36px 74px),
        radial-gradient(ellipse at 24% 18%, rgba(116, 96, 58, 0.04) 0, transparent 34%),
        radial-gradient(ellipse at 72% 64%, rgba(88, 74, 48, 0.03) 0, transparent 31%),
        radial-gradient(circle at 18% 14%, rgba(80, 65, 35, 0.035) 0 0.35px, transparent 0.8px),
        radial-gradient(circle at 74% 31%, rgba(40, 35, 25, 0.026) 0 0.3px, transparent 0.78px),
        radial-gradient(circle at 38% 72%, rgba(180, 168, 130, 0.045) 0 0.45px, transparent 0.95px),
        repeating-linear-gradient(98deg, rgba(120, 106, 68, 0.018) 0 0.45px, transparent 0.45px 4.8px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(253, 249, 238, 0.3));
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%, 7px 7px, 9px 9px, 11px 11px, 100% 100%, 100% 100%;
      padding: 12mm;
      box-shadow:
        inset 0 0 0 1px rgba(150, 135, 100, 0.16),
        inset 0 0 24mm rgba(90, 76, 45, 0.035),
        0 0 6px rgba(0,0,0,0.08);
      page-break-after: always;
      font-family: "Times New Roman", Times, serif;
      overflow: hidden;
    }

    @page { size: A4 portrait; margin: 0; }

    @media print {
      body { margin: 0; padding: 0; background: #fff; zoom: 90%; }
      .container { margin: 0; padding: 0; max-width: none; }
      .controls { display: none !important; }
      .png-preview-modal { display: none !important; }
      .preview-shell { overflow: visible; padding: 0; }
      .pages-wrapper { min-width: 0; display: block; transform: none !important; }
      .preview-shell { height: auto !important; }
      .page,
      .page-continuation {
        background: #fff !important;
        box-shadow: none;
        margin: 0;
        padding: 10mm;
        height: 297mm;
        min-height: 297mm;
        overflow: hidden;
      }
      .codes { page-break-inside: auto; }
      .page:empty,
      .page-continuation:empty { display: none; }
    }

    .header-table { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
    .header-table td { vertical-align: top; padding: 0; }
    .logo-cell { width: 160px; padding-left: 6px; }
    .logo-cell img { max-width: 150px; display: block; margin: auto; }
    .company-block {
      text-align: center;
      font-weight: 700;
      font-size: 9px;
      line-height: 1.05;
      margin-top: 6px;
      white-space: nowrap;
    }
    .company-block .line2 { display: block; margin-top: 4px; }
    .center-cell { text-align: center; }
    .center-cell .gov { font-size: 13px; font-weight: 700; }
    .center-cell .motto { font-size: 14px; margin-top: 6px; font-weight: 600; }
    .date-cell {
      width: 160px;
      text-align: right;
      font-style: italic;
      font-size: 12px;
      padding-right: 6px;
      white-space: nowrap;
    }

    h1.title {
      display: block;
      width: 100%;
      text-align: center;
      margin: 8px 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 6px; }
    .info-table td { padding: 4px 6px; vertical-align: top; }
    .info-left { width: 60%; }
    .info-right { width: 40%; }
    .receiver-names {
      display: inline-block;
      max-width: calc(100% - 52px);
      vertical-align: baseline;
      font-weight: 700;
      word-break: break-word;
    }

    .note { font-style: italic; margin: 6px 0; font-size: 13px; }

    .codes {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      page-break-inside: auto;
    }
    .codes th,
    .codes td {
      border: 0.55px solid rgba(20, 20, 20, 0.44);
      padding: 2px 4px;
      text-align: center;
      vertical-align: middle;
      word-break: break-all;
    }
    .codes th { font-weight: 700; background: rgba(255, 255, 255, 0.2); }
    .codes td.stt { font-weight: 600; }
    .codes tr { page-break-inside: avoid; }

    .confirm {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.3;
    }

    .sign-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      font-size: 13px;
      table-layout: fixed;
    }

    .sign-table td {
      vertical-align: bottom;
      text-align: center;
      padding: 5px 6px;
    }

    .sign-title {
      font-weight: 700;
      height: 24px;
    }

    .sign-gap { width: 4%; }

    .sign-space {
      height: 84px;
      vertical-align: top !important;
      padding-top: 0 !important;
    }

    .handover-signature {
      min-height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .handover-signature .signature-list {
      min-height: 60px;
      grid-template-columns: minmax(150px, 1fr);
    }

    .handover-full-name {
      margin-top: -5px;
      font-size: 13px;
      line-height: 1.12;
      font-weight: 700;
    }

    .receiver-confirmation {
      margin-top: -2px;
      font-size: 13px;
      line-height: 1.15;
      font-weight: 700;
    }

    .signature-list {
      min-height: 52px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      align-items: start;
      justify-items: center;
      gap: 0 4px;
    }

    .signature-list.compact {
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
    }

    .signature-list.receiver-cloud {
      display: flex;
      width: min(100%, 286px);
      min-height: 50px;
      margin: 0 auto;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      align-content: flex-start;
      justify-content: center;
      gap: 0 2px;
      padding: 0;
    }

    .signature-item {
      width: 100%;
      min-height: 46px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    .receiver-cloud .signature-item {
      width: auto;
      min-height: 40px;
      align-items: center;
      flex: 0 0 auto;
      margin: -6px -4px;
    }

    .receiver-cloud .signature-item + .signature-item {
      margin-left: 0;
    }

    .signature-row-break {
      flex-basis: 100%;
      width: 0;
      height: 0;
      margin-top: -12px;
    }

    .signature-canvas {
      display: block;
      max-width: 100%;
      image-rendering: auto;
    }

    .signature-empty {
      min-height: 54px;
    }

    .tbl-wrap { overflow: hidden; }

    .is-exporting-png .logo-cell img {
      filter: grayscale(1) brightness(0);
    }

    .is-exporting-png .codes th,
    .is-exporting-png .codes td {
      border-color: rgba(20, 20, 20, 0.34);
      border-width: 0.45px;
    }

    .is-exporting-png .codes td.stt {
      font-weight: 500;
    }

    .png-preview-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: rgba(10, 18, 26, 0.58);
    }

    .png-preview-modal.is-open {
      display: flex;
    }

    .png-preview-dialog {
      width: min(980px, 100%);
      max-height: calc(100dvh - 24px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
      border: 1px solid rgba(215, 224, 231, 0.9);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
    }

    .png-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .png-preview-title {
      font-weight: 800;
      color: #1d2a34;
      font-size: 16px;
      line-height: 1.25;
    }

    .png-preview-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .png-preview-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .png-preview-body {
      flex: 1 1 auto;
      overflow: auto;
      display: grid;
      gap: 12px;
      justify-items: center;
      padding: 12px;
      background: #e9eef2;
      -webkit-overflow-scrolling: touch;
    }

    .png-preview-page {
      width: min(100%, 794px);
      margin: 0 auto;
    }

    .png-preview-page img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      box-shadow: 0 6px 22px rgba(20, 28, 36, 0.18);
    }

    .png-preview-empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px 12px;
    }

    @media (max-width: 760px) {
      body { padding: 8px; }
      .container { max-width: none; }
      .controls { padding: 10px; }
      .controls-head {
        display: flex;
        gap: 6px 10px;
      }
      .control-title { text-align: center; }
      .control-note {
        position: static;
        max-width: none;
        text-align: center;
      }
      .control-grid { grid-template-columns: 1fr; }
      .primary-action {
        justify-content: stretch;
      }
      .primary-action button {
        width: 100%;
      }
      .actions,
      .receiver-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .actions button,
      .receiver-actions button {
        width: 100%;
      }
      .preview-shell {
        margin: 0 -8px;
        overflow: hidden;
        padding: 0 8px 16px;
      }
      .png-preview-modal {
        padding: 8px;
        align-items: stretch;
      }
      .png-preview-dialog {
        max-height: calc(100dvh - 16px);
      }
      .png-preview-head {
        align-items: stretch;
        flex-direction: column;
        gap: 9px;
      }
      .png-preview-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .png-preview-actions button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .actions,
      .receiver-actions,
      .png-preview-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls" role="region" aria-label="Điều khiển tạo biên bản">
      <div class="controls-head">
        <div>
          <div class="control-title">Biên bản bàn giao</div>
  
        </div>
        <div class="control-note">Mã vận đơn = cột A · Nhân viên = cột M</div>
      </div>

      <div class="control-grid">
        <label class="field">
          <span>File kiểm kho</span>
          <input type="file" id="inventoryFile" accept=".xlsx,.xls" title="Upload file kiểm kho (.xlsx)"/>
        </label>

        <label class="field">
          <span>Người bàn giao</span>
          <select id="employeeSelect" title="Chọn nhân viên">
            <option value="">-- Chọn nhân viên --</option>
          </select>
        </label>

        <label class="field">
          <span>Mã bưu cục</span>
          <select id="bcSelect" title="Chọn mã bưu cục">
            <option value="">-- Chọn Mã BC --</option>
          </select>
        </label>

        <label class="field">
          <span>Cỡ chữ ký</span>
          <select id="signatureSizeSelect" title="Chọn cỡ chữ ký">
            <option value="22">Nhỏ 22px</option>
            <option value="26" selected>Vừa 26px</option>
            <option value="30">Lớn 30px</option>
            <option value="34">Rất lớn 34px</option>
          </select>
        </label>

      </div>

      <div class="primary-action">
        <button type="button" id="btnGenerate">Tạo biên bản</button>
      </div>

      <div class="actions">
        <button type="button" id="btnToggleReceiver" class="secondary">Nhập người nhận</button>
        <button type="button" id="btnExportPng" class="ghost">Xuất PNG</button>
        <button type="button" id="btnPrint">In A4</button>
      </div>

      <div class="receiver-panel" id="receiverPanel">
        <label class="field" for="receiverNamesInput">
          <span>Tên người nhận bàn giao</span>
          <textarea id="receiverNamesInput" placeholder="Ví dụ: Nguyễn Văn A, Trần Thị B"></textarea>
        </label>
        <div class="field-note">Có thể nhập một hoặc nhiều tên, mỗi tên cách nhau bằng dấu phẩy (,).</div>
        <div class="receiver-actions">
          <button type="button" id="btnSaveReceiver" class="ghost">Lưu tên người nhận</button>
        </div>
        <div class="receiver-status" id="receiverStatus">Chưa nhập người nhận.</div>
      </div>
    </div>

    <div class="preview-shell" id="previewShell">
      <div id="pages" class="pages-wrapper"></div>
    </div>
  </div>

  <div class="png-preview-modal" id="pngPreviewModal" aria-hidden="true">
    <div class="png-preview-dialog" role="dialog" aria-modal="true" aria-labelledby="pngPreviewTitle">
      <div class="png-preview-head">
        <div>
          <div class="png-preview-title" id="pngPreviewTitle">Xem trước PNG</div>
          <div class="png-preview-note" id="pngPreviewNote">Kiểm tra ảnh trước khi tải xuống.</div>
        </div>
        <div class="png-preview-actions">
          <button type="button" id="btnCopyPreviewPng" class="secondary">Copy PNG</button>
          <button type="button" id="btnDownloadPreviewPng">Tải PNG</button>
          <button type="button" id="btnClosePngPreview" class="ghost">Đóng</button>
        </div>
      </div>
      <div class="png-preview-body" id="pngPreviewBody">
        <div class="png-preview-empty">Chưa có ảnh xem trước.</div>
      </div>
    </div>
  </div>

<script>
  const LOGO_URL = "https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/J%26T_Express_logo.svg/3840px-J%26T_Express_logo.svg.png";

  const bcMap = {
    "024K33": "Pickup Hà Đông 4",
    "024K44": "Pickup Hà Đông 5"
  };

  const bcSelect = document.getElementById("bcSelect");
  Object.entries(bcMap).forEach(([code, name]) => {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = `${code} - ${name}`;
    bcSelect.appendChild(opt);
  });

  function todayDateString() {
    const d = new Date();
    return `Hà Nội, Ngày ${String(d.getDate()).padStart(2, "0")} Tháng ${String(d.getMonth() + 1).padStart(2, "0")} Năm ${d.getFullYear()}`;
  }

  const CURRENT_DATE_STR = todayDateString();
  const inventoryFile = document.getElementById("inventoryFile");
  const employeeSelect = document.getElementById("employeeSelect");
  const signatureSizeSelect = document.getElementById("signatureSizeSelect");
  const btnGenerate = document.getElementById("btnGenerate");
  const btnToggleReceiver = document.getElementById("btnToggleReceiver");
  const btnExportPng = document.getElementById("btnExportPng");
  const btnPrint = document.getElementById("btnPrint");
  const receiverPanel = document.getElementById("receiverPanel");
  const receiverNamesInput = document.getElementById("receiverNamesInput");
  const btnSaveReceiver = document.getElementById("btnSaveReceiver");
  const receiverStatus = document.getElementById("receiverStatus");
  const previewShell = document.getElementById("previewShell");
  const pagesWrapper = document.getElementById("pages");
  const pngPreviewModal = document.getElementById("pngPreviewModal");
  const pngPreviewBody = document.getElementById("pngPreviewBody");
  const pngPreviewNote = document.getElementById("pngPreviewNote");
  const btnCopyPreviewPng = document.getElementById("btnCopyPreviewPng");
  const btnDownloadPreviewPng = document.getElementById("btnDownloadPreviewPng");
  const btnClosePngPreview = document.getElementById("btnClosePngPreview");

  let empMap = {};
  let receiverNames = [];
  let receiverSignatureStates = [];
  let receiverSignaturesReady = false;
  let handoverSignatureState = null;
  let handoverSignatureName = "";
  let activeEmpName = "";
  let activeCodes = [];
  let hasGeneratedDocument = false;
  let pngPreviewFiles = [];
  let blackLogoDataUrl = "";
  const signatureFontsReady = SignatureAlgorithm.loadFontsFromFolder("font");

  function escapeHtml(s) {
    return String(s || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function parseReceiverNames(value) {
    return String(value || "")
      .split(",")
      .map((name) => name.trim())
      .filter(Boolean);
  }

  function updateReceiverStatus() {
    if (!receiverNames.length) {
      receiverStatus.textContent = "Chưa nhập người nhận.";
      return;
    }
    const names = receiverNames.join(", ");
    receiverStatus.textContent = receiverSignaturesReady

  function ensureHandoverSignature(empName, force = false) {
    if (!empName) return null;

    if (force || !handoverSignatureState || handoverSignatureName !== empName) {
      handoverSignatureState = SignatureAlgorithm.makeSignatureState("normal", "handover");
      handoverSignatureName = empName;

    return handoverSignatureState;

  function randomizeReceiverSignatures() {
    syncSignatureFontSize();
    const compact = receiverNames.length > 2;
    receiverSignatureStates = receiverNames.map(() => SignatureAlgorithm.makeSignatureState(compact ? "compact" : "normal", "receiver"));
    receiverSignaturesReady = receiverNames.length > 0;

  function refreshSignatureSizing() {
    syncSignatureFontSize();
    if (handoverSignatureName) {

  const TABLE_COLS = 4;
  const EMPTY_TABLE_ROW_HTML = '<tr><td class="stt">&nbsp;</td><td class="code">&nbsp;</td><td class="stt">&nbsp;</td><td class="code">&nbsp;</td><td class="stt">&nbsp;</td><td class="code">&nbsp;</td><td class="stt">&nbsp;</td><td class="code">&nbsp;</td></tr>';

  function htmlToElement(html) {
    const template = document.createElement("template");
    template.innerHTML = String(html || "").trim();
    return template.content.firstElementChild;
  }

  function buildTableRows(codes, startIndex, maxRows) {
    const rows = [];
    const totalRows = Math.min(maxRows, Math.ceil((codes.length - startIndex) / TABLE_COLS));
    for (let r = 0; r < totalRows; r++) {
      let rowHtml = "<tr>";
      for (let c = 0; c < TABLE_COLS; c++) {
        const idx = r * TABLE_COLS + c + startIndex;
        if (idx < codes.length) {
          rowHtml += `<td class="stt">${idx + 1}</td><td class="code">${escapeHtml(codes[idx])}</td>`;
        } else {
          rowHtml += '<td class="stt">&nbsp;</td><td class="code">&nbsp;</td>';
        }
      }
      rowHtml += "</tr>";
      rows.push(rowHtml);
    }
    return rows;
  }

  function appendEmptyRows(tbody, count) {
    if (count > 0) tbody.insertAdjacentHTML("beforeend", EMPTY_TABLE_ROW_HTML.repeat(count));
  }

  function createContinuationPage() {
    const contPage = document.createElement("div");
    contPage.className = "page-continuation";

    const tblWrap = document.createElement("div");
    tblWrap.className = "tbl-wrap";

    const table = document.createElement("table");
    table.className = "codes";

    const tbody = document.createElement("tbody");
    table.appendChild(tbody);
    tblWrap.appendChild(table);
    contPage.appendChild(tblWrap);

    return { page: contPage, tblWrap, tbody };
  }

  function isPageOverflowing(pageEl) {
    return pageEl.scrollHeight > pageEl.clientHeight + 2;
  }

  function appendMeasuredCodeRows(pageEl, tbody, codes, startIndex) {
    let currentIndex = startIndex;

    while (currentIndex < codes.length) {
      const rowHtml = buildTableRows(codes, currentIndex, 1)[0];
      if (!rowHtml) break;

      tbody.insertAdjacentHTML("beforeend", rowHtml);
      const insertedRow = tbody.lastElementChild;

      if (isPageOverflowing(pageEl)) {
        insertedRow.remove();
        if (currentIndex === startIndex) {
          tbody.insertAdjacentHTML("beforeend", rowHtml);
          currentIndex += TABLE_COLS;
        }
        break;
      }

      currentIndex += TABLE_COLS;
    }

    return currentIndex;
  }

  function removeSignatureFromPage(pageEl) {
    Array.from(pageEl.children).forEach((child) => {
      if (child.classList.contains("confirm") || child.classList.contains("sign-table")) {
        child.remove();
      }
    });
  }

  function appendSignatureToPage(pageEl, empName) {
    removeSignatureFromPage(pageEl);
    const tblWrap = pageEl.querySelector(".tbl-wrap");
    if (tblWrap) tblWrap.insertAdjacentHTML("afterend", confirmSignHtml(empName));

  function removeEmptyContinuationPages() {
    Array.from(pagesWrapper.querySelectorAll(".page-continuation")).forEach((pageEl) => {
      const hasRows = !!pageEl.querySelector(".codes tbody tr");
      const hasSignature = !!pageEl.querySelector(".confirm, .sign-table");
      if (!hasRows && !hasSignature) pageEl.remove();
    });
  }

  function appendSignatureWithPagination(empName) {
    const pages = Array.from(pagesWrapper.querySelectorAll(".page, .page-continuation"));
    const lastPage = pages[pages.length - 1];
    if (!lastPage) return;

    appendSignatureToPage(lastPage, empName);
    if (!isPageOverflowing(lastPage)) return;

    removeSignatureFromPage(lastPage);

    const finalPage = createContinuationPage();
    pagesWrapper.appendChild(finalPage.page);

    const sourceTbody = lastPage.querySelector(".codes tbody");
    const keepRowsOnSource = lastPage.classList.contains("page") ? 1 : 0;

    while (sourceTbody && sourceTbody.rows.length > keepRowsOnSource) {
      const row = sourceTbody.rows[sourceTbody.rows.length - 1];
      finalPage.tbody.insertBefore(row, finalPage.tbody.firstChild);

      appendSignatureToPage(finalPage.page, empName);
      const overflows = isPageOverflowing(finalPage.page);
      removeSignatureFromPage(finalPage.page);

      if (overflows) {
        sourceTbody.appendChild(finalPage.tbody.firstElementChild);
        break;
      }
    }

    appendSignatureToPage(finalPage.page, empName);
    removeEmptyContinuationPages();
  }

  function paginateRows(empName, codes) {
    pagesWrapper.innerHTML = "";
    pagesWrapper.style.transform = "";
    previewShell.style.height = "";

    const { maBC, tenBC } = getBcInfo();
    const firstPage = htmlToElement(createFirstPageSkeleton(empName, CURRENT_DATE_STR, maBC, tenBC));
    const firstTbody = firstPage.querySelector(".codes tbody");
    pagesWrapper.appendChild(firstPage);

    if (!codes || !codes.length) {
      appendEmptyRows(firstTbody, 8);
      appendSignatureWithPagination(empName);
      schedulePreviewFit();
      return;
    }

    let currentIndex = appendMeasuredCodeRows(firstPage, firstTbody, codes, 0);

    while (currentIndex < codes.length) {
      const contPage = createContinuationPage();
      pagesWrapper.appendChild(contPage.page);

      const nextIndex = appendMeasuredCodeRows(contPage.page, contPage.tbody, codes, currentIndex);
      currentIndex = nextIndex > currentIndex ? nextIndex : currentIndex + TABLE_COLS;
    }

    appendSignatureWithPagination(empName);
    schedulePreviewFit();
  }

  function canvasToPngBlob(canvas) {
    return new Promise((resolve, reject) => {
      canvas.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error("Không tạo được PNG blob."));
      }, "image/png");
    });
  }

  function blobToObjectUrl(blob) {
    return URL.createObjectURL(blob);
  }

  async function makeBlackLogoDataUrl() {
    if (blackLogoDataUrl) return blackLogoDataUrl;

    blackLogoDataUrl = await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        try {
          const canvas = document.createElement("canvas");
          canvas.width = img.naturalWidth || img.width;
          canvas.height = img.naturalHeight || img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < imageData.data.length; i += 4) {
            if (imageData.data[i + 3] > 0) {
              imageData.data[i] = 0;
              imageData.data[i + 1] = 0;
              imageData.data[i + 2] = 0;
            }
          }
          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL("image/png"));
        } catch (err) {
          reject(err);
        }
      };
      img.onerror = () => reject(new Error("Không tải được logo để đổi màu đen."));
      img.src = LOGO_URL;
    });

    return blackLogoDataUrl;
  }

  async function waitForImages(root) {
    const images = Array.from(root.querySelectorAll("img"));
    await Promise.allSettled(images.map((img) => {
      if (img.complete && img.naturalWidth) return Promise.resolve();
      if (img.decode) return img.decode();
      return new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }));
  }

  async function copyPreviewPngFiles() {
    if (!pngPreviewFiles.length) {

      return;

    try {

      pngPreviewNote.textContent = pngPreviewFiles.length > 1

      console.error(err);

  async function exportPagesAsPng() {
    if (!hasGeneratedDocument) {
      alert("Hãy tạo biên bản trước khi xuất PNG.");
      return;
    }

    const pageEls = Array.from(pagesWrapper.querySelectorAll(".page, .page-continuation"));
    if (!pageEls.length) return alert("Chưa có trang biên bản để xuất.");
    if (!window.html2canvas) return alert("Chưa tải được thư viện xuất PNG. Hãy kiểm tra kết nối mạng.");

    const oldTransform = pagesWrapper.style.transform;
    const oldHeight = previewShell.style.height;
    const logoImgs = Array.from(pagesWrapper.querySelectorAll(".logo-cell img"));
    const originalLogoSrcs = logoImgs.map((img) => img.getAttribute("src"));
    pagesWrapper.style.transform = "";
    previewShell.style.height = "";

    try {
      setExportBusy(true);
      clearPngPreview();
      pagesWrapper.classList.add("is-exporting-png");

      try {
        const blackLogo = await makeBlackLogoDataUrl();
        logoImgs.forEach((img) => {
          img.src = blackLogo;
        });
      } catch (logoErr) {
        console.warn("Không đổi được logo sang ảnh đen, dùng CSS filter khi xuất PNG:", logoErr);
      }

      await waitForImages(pagesWrapper);
      if (document.fonts && document.fonts.ready) await document.fonts.ready.catch(() => {});
      await SignatureAlgorithm.paintSignatures(pagesWrapper);
      await new Promise((resolve) => setTimeout(resolve, 80));
      pagesWrapper.style.transform = "";
      previewShell.style.height = "";

      const files = [];
      for (let i = 0; i < pageEls.length; i++) {
        pagesWrapper.style.transform = "";
        previewShell.style.height = "";
        const canvas = await html2canvas(pageEls[i], {
          backgroundColor: null,
          scale: 2,
          useCORS: true,
          logging: false
        });
        const blob = await canvasToPngBlob(canvas);
        files.push({
          name: pngFileName(i, pageEls.length),
          url: blobToObjectUrl(blob),
          blob
        });
      }
      showPngPreview(files);
    } catch (err) {
      console.error(err);
      alert("Không xuất được PNG. Nếu lỗi do logo online, hãy thử lại khi có mạng ổn định.");
    } finally {
      logoImgs.forEach((img, index) => {
        img.src = originalLogoSrcs[index] || LOGO_URL;
      });
      pagesWrapper.classList.remove("is-exporting-png");
      setExportBusy(false);
      pagesWrapper.style.transform = oldTransform;
      previewShell.style.height = oldHeight;
      schedulePreviewFit();
    }
  }

    hasGeneratedDocument = true;
    ensureHandoverSignature(empName, true);
    paginateRows(activeEmpName, activeCodes);
  });

  btnToggleReceiver.addEventListener("click", () => {
    receiverPanel.classList.toggle("is-open");
    if (receiverPanel.classList.contains("is-open")) {
      receiverNamesInput.focus();
    }
  });

  btnSaveReceiver.addEventListener("click", () => {
    saveReceiverNames(false);
  });

  btnExportPng.addEventListener("click", exportPagesAsPng);
  btnCopyPreviewPng.addEventListener("click", copyPreviewPngFiles);
  btnDownloadPreviewPng.addEventListener("click", downloadPreviewPngFiles);
  btnClosePngPreview.addEventListener("click", closePngPreview);
  pngPreviewModal.addEventListener("click", (event) => {
    if (event.target === pngPreviewModal) closePngPreview();
  });
  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && pngPreviewModal.classList.contains("is-open")) {
      closePngPreview();
    }
  });
  bcSelect.addEventListener("change", rerenderCurrentDocument);
  signatureSizeSelect.addEventListener("change", refreshSignatureSizing);
  window.addEventListener("resize", fitPreviewToScreen);
  btnPrint.addEventListener("click", printCurrentDocument);
</script>
</body>
</html>
