<!doctype html>
<html>
<head>
  <style>
    body { margin: 0; background: #e9eef2; }
    iframe { width: 100vw; height: 100vh; border: 0; }
  </style>
</head>
<body>
  <iframe id="frame" src="index.html"></iframe>
  <script>
    const frame = document.getElementById("frame");
    frame.addEventListener("load", async () => {
      const w = frame.contentWindow;
      const codes = Array.from({ length: 360 }, (_, index) => `JT${String(index + 1).padStart(10, "0")}`);
      await w.eval("signatureFontsReady");
      w.document.getElementById("signatureSizeInput").value = "28";
      w.eval(`
        syncSignatureFontSize();
        activeEmpName = "Nguyen Van An";
        activeCodes = ${JSON.stringify(Array.from({ length: 360 }, (_, index) => `JT${String(index + 1).padStart(10, "0")}`))};
        hasGeneratedDocument = true;
        ensureHandoverSignature(activeEmpName, true);
        receiverNames = ["Tran Thi Binh", "Le Minh Hoa"];
        receiverSignatureStates = receiverNames.map(() => SignatureAlgorithm.makeSignatureState("normal", "receiver", [handoverSignatureState.fontFamily]));
        receiverSignaturesReady = true;
      `);
      w.paginateRows("Nguyen Van An", codes);
      await w.SignatureAlgorithm.paintSignatures(w.document);
    });
  </script>
</body>
</html>
